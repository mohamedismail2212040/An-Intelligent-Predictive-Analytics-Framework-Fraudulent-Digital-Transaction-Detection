<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Fraud Detection in UPI, Credit and ATM Surveillance System</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111418; --surface2: #181c22;
    --border: #1f2430; --accent: #00e5ff; --text: #e2e8f0;
    --muted: #64748b; --cc: #ff6b35; --upi: #00e5ff; --atm: #a78bfa;
    --code-bg: #0d1117; --green: #98c379;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Syne", sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { padding: 36px 40px 24px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(0,229,255,0.03), transparent 60%); }
  .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
  header h1 { font-size: clamp(24px, 3.5vw, 42px); font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff 30%, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-sub { margin-top: 6px; color: var(--muted); font-size: 13px; }
  .stats { display: flex; gap: 28px; margin-top: 20px; flex-wrap: wrap; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); display: block; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: "JetBrains Mono", monospace; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; padding: 12px 40px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .fbtn { font-size: 11px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: "Syne", sans-serif; font-weight: 600; transition: all 0.15s; }
  .fbtn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .fbtn.active { color: #000; border-color: transparent; }
  .fbtn.all.active  { background: var(--accent); }
  .fbtn.cc.active   { background: var(--cc); }
  .fbtn.upi.active  { background: var(--upi); }
  .fbtn.atm.active  { background: var(--atm); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 205px); }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sec-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: "JetBrains Mono", monospace; padding: 16px 18px 6px; }
  .nb-item { display: flex; align-items: center; gap: 11px; padding: 10px 18px; cursor: pointer; transition: background 0.12s; border-left: 2px solid transparent; }
  .nb-item:hover { background: var(--surface2); }
  .nb-item.active { background: var(--surface2); border-left-color: var(--ic, var(--accent)); }
  .nb-badge { width: 33px; height: 33px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 600; flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--ic, var(--accent)); }
  .nb-meta { flex: 1; min-width: 0; }
  .nb-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nb-info { font-size: 10px; color: var(--muted); font-family: "JetBrains Mono", monospace; margin-top: 2px; }
  .nb-imgs { font-size: 9px; color: #a78bfa; font-family: "JetBrains Mono", monospace; margin-top: 2px; }

  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 11px 22px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  .tb-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .tb-left h2 { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
  .cat-tag { font-size: 10px; font-family: "JetBrains Mono", monospace; padding: 2px 8px; border-radius: 4px; border: 1px solid; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
  .tb-right { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
  .btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; font-family: "Syne", sans-serif; cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap; }
  .btn-out { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-out:hover { border-color: var(--accent); color: var(--accent); }
  .btn-vs { background: #0078d4; color: #fff; }
  .btn-vs:hover { background: #106ebe; }

  .prog-bar { height: 2px; background: var(--border); flex-shrink: 0; }
  .prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

  /* CELLS */
  .cells-wrap { flex: 1; overflow-y: auto; padding: 18px 22px 30px; }
  .cells-wrap::-webkit-scrollbar { width: 5px; }
  .cells-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .cell { display: flex; gap: 10px; margin-bottom: 16px; }
  .cell-num { width: 28px; flex-shrink: 0; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); padding-top: 10px; text-align: right; }
  .cell-body { flex: 1; min-width: 0; }

  /* Code block */
  .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; background: rgba(255,255,255,0.025); border-bottom: 1px solid var(--border); }
  .code-lang { font-size: 9px; font-family: "JetBrains Mono", monospace; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .copy-btn { font-size: 10px; font-family: "JetBrains Mono", monospace; color: var(--muted); background: none; border: none; cursor: pointer; padding: 2px 7px; border-radius: 3px; transition: all 0.12s; }
  .copy-btn:hover { color: var(--accent); background: rgba(0,229,255,0.08); }
  pre { padding: 12px 14px; font-family: "JetBrains Mono", monospace; font-size: 12px; line-height: 1.65; overflow-x: auto; color: #abb2bf; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; }
  pre::-webkit-scrollbar { height: 4px; width: 4px; }
  pre::-webkit-scrollbar-thumb { background: #2d333b; }

  /* Output types */
  .out-text {
    margin-top: 4px; background: rgba(13,17,23,0.8); border: 1px solid var(--border);
    border-left: 3px solid var(--green); border-radius: 0 6px 6px 0;
    padding: 10px 14px; font-family: "JetBrains Mono", monospace; font-size: 11.5px;
    color: var(--green); line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    max-height: 260px; overflow-y: auto;
  }
  .out-text::-webkit-scrollbar { width: 4px; }
  .out-text::-webkit-scrollbar-thumb { background: var(--border); }

  .out-html {
    margin-top: 4px; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; overflow-x: auto; font-size: 12px;
  }
  .out-html table { border-collapse: collapse; font-size: 11px; font-family: "JetBrains Mono", monospace; min-width: 100%; }
  .out-html thead tr { background: rgba(0,229,255,0.06); }
  .out-html th { padding: 6px 12px; text-align: left; color: var(--accent); border: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
  .out-html td { padding: 5px 12px; border: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  .out-html tbody tr:hover { background: rgba(255,255,255,0.03); }
  .out-html tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }

  .out-image {
    margin-top: 6px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .out-image img { max-width: 100%; max-height: 520px; border-radius: 4px; cursor: zoom-in; transition: opacity 0.15s; }
  .out-image img:hover { opacity: 0.9; }
  .img-cap { font-size: 10px; font-family: "JetBrains Mono", monospace; color: var(--muted); margin-top: 7px; }

  .cell-md { background: rgba(167,139,250,0.05); border: 1px solid rgba(167,139,250,0.15); border-radius: 7px; padding: 13px 16px; font-size: 13px; line-height: 1.75; color: var(--text); }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); text-align: center; }
  .empty-icon { font-size: 42px; opacity: 0.3; }
  .empty h3 { font-size: 16px; opacity: 0.5; color: var(--text); }
  .empty p { font-size: 12px; }

  /* Lightbox */
  #lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 9999; align-items: center; justify-content: center; }
  #lb.on { display: flex; }
  #lb img { max-width: 93vw; max-height: 90vh; border-radius: 6px; box-shadow: 0 0 80px rgba(0,0,0,0.9); }
  #lb-close { position: absolute; top: 16px; right: 22px; font-size: 24px; color: #fff; cursor: pointer; background: none; border: none; opacity: 0.7; transition: opacity 0.15s; line-height: 1; }
  #lb-close:hover { opacity: 1; }

  .topbar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 9998; width: 0%; transition: width 0.4s ease; }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>

<header>
  <h1>Financial Fraud Detection in UPI, Credit and ATM Surveillance System</h1>

  <div class="stats">
    <div><span class="stat-num">9</span><span class="stat-label">Notebooks</span></div>
    <div><span class="stat-num">3</span><span class="stat-label">Domains</span></div>
    <div><span class="stat-num" id="s-cells">—</span><span class="stat-label">Total Cells</span></div>
    <div><span class="stat-num" id="s-imgs">—</span><span class="stat-label">Image Outputs</span></div>
  </div>
</header>

<div class="filter-bar">
  <button class="fbtn all active" onclick="filter('all',this)">All</button>
  <button class="fbtn cc"  onclick="filter('Credit Card',this)">Credit Card</button>
  <button class="fbtn upi" onclick="filter('UPI',this)">UPI</button>
  <button class="fbtn atm" onclick="filter('ATM',this)">ATM</button>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div style="padding:20px;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace">Loading...</div>
  </aside>
  <main class="main">
    <div class="toolbar">
      <div class="tb-left">
        <h2 id="nb-title">Select a notebook</h2>
        <span class="cat-tag" id="nb-cat" style="display:none"></span>
      </div>
      <div class="tb-right">
        <button class="btn btn-out" id="btn-copy" onclick="copyAll()" style="display:none">📋 Copy All Code</button>
        <button class="btn btn-vs"  id="btn-vs"   onclick="dlNb()"   style="display:none">
          <svg width="12" height="12" viewBox="0 0 100 100" fill="currentColor"><path d="M97.28 13.27L75.1 1.07a5.2 5.2 0 0 0-5.77.72L2.75 59.28a3.47 3.47 0 0 0-.24 5.15l6.17 5.68a3.47 3.47 0 0 0 4.38.19l72.5-55.21a3.47 3.47 0 0 1 5.52 2.79V27a3.44 3.44 0 0 1-1.42 2.81L42.25 56.77l-13.88 10.6 22.5 20.77 36-28.5A10.4 10.4 0 0 0 91 51v-29.4a5.2 5.2 0 0 0-3.72-5.33zM13 80.38A3.46 3.46 0 0 1 7.48 78l-4.72-4.38a3.46 3.46 0 0 1-.11-5.11l12-11.14z"/></svg>
          Open in VS Code
        </button>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="cells-wrap" id="cells">
      <div class="empty">
        <div class="empty-icon">📓</div>
        <h3>Select a notebook to preview</h3>
        <p>Browse code, text outputs, dataframes and plots from the sidebar</p>
      </div>
    </div>
  </main>
</div>

<div id="lb" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script src="nb_data.js"></script>
<script>
const COLORS = { "Credit Card":"#ff6b35", "UPI":"#00e5ff", "ATM":"#a78bfa" };
let cur = null;

function init() {
  const bar = document.getElementById('topbar');
  bar.style.width = '80%';
  document.getElementById('s-cells').textContent = NB_DATA.reduce((s,n)=>s+n.total,0);
  document.getElementById('s-imgs').textContent  = NB_DATA.reduce((s,n)=>s+n.imgs,0);
  renderSidebar(NB_DATA);
  bar.style.width = '100%';
  setTimeout(()=>{ bar.style.transition='none'; bar.style.width='0%'; setTimeout(()=>bar.style.transition='',100); },500);
}

function renderSidebar(data) {
  const cats = {};
  data.forEach(n=>{ if(!cats[n.cat]) cats[n.cat]=[]; cats[n.cat].push(n); });
  let h = '';
  for(const cat of Object.keys(cats)){
    const col = COLORS[cat]||'#00e5ff';
    h += `<div class="sec-label" style="color:${col}">${cat}</div>`;
    for(const nb of cats[cat]){
      const idx = NB_DATA.indexOf(nb);
      h += `<div class="nb-item" style="--ic:${col}" id="ni-${idx}" onclick="pick(${idx})">
        <div class="nb-badge">${nb.typ}</div>
        <div class="nb-meta">
          <div class="nb-name">${nb.title}</div>
          <div class="nb-info">${nb.total} cells &middot; ${nb.code} code</div>
          ${nb.imgs>0?`<div class="nb-imgs">&#128247; ${nb.imgs} image${nb.imgs>1?'s':''}</div>`:''}
        </div>
      </div>`;
    }
  }
  document.getElementById('sidebar').innerHTML = h;
  if(cur){ const el=document.getElementById('ni-'+NB_DATA.indexOf(cur)); if(el)el.classList.add('active'); }
}

function filter(cat,btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar(cat==='all'?NB_DATA:NB_DATA.filter(n=>n.cat===cat));
}

function pick(idx){
  cur = NB_DATA[idx];
  document.querySelectorAll('.nb-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('ni-'+idx);
  if(el){ el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }

  const col = COLORS[cur.cat]||'#00e5ff';
  document.getElementById('nb-title').textContent = cur.title;
  const tag = document.getElementById('nb-cat');
  tag.textContent = cur.cat;
  tag.style.cssText = `color:${col};border-color:${col};background:${col}18;display:inline-block`;
  document.getElementById('btn-copy').style.display='flex';
  document.getElementById('btn-vs').style.display='flex';

  const p = document.getElementById('prog');
  p.style.transition='none'; p.style.width='0%';
  requestAnimationFrame(()=>{ p.style.transition='width 0.4s ease'; p.style.width='100%';
    setTimeout(()=>{ p.style.width='0%'; },500); });

  renderCells(cur);
}

function renderCells(nb){
  const area = document.getElementById('cells');
  let h = '';
  nb.cells.forEach((cell,i)=>{
    if(cell.type==='code'){
      let outs = '';
      (cell.outputs||[]).forEach(o=>{
        if(o.type==='image'){
          outs += `<div class="out-image">
            <img src="data:image/png;base64,${o.content}" loading="lazy" onclick="openLb(this)" title="Click to enlarge">
            <div class="img-cap">&#128202; Output plot &mdash; click to enlarge</div>
          </div>`;
        } else if(o.type==='html'){
          outs += `<div class="out-html">${o.content}</div>`;
        } else if(o.type==='text' && o.content && o.content.trim()){
          outs += `<div class="out-text">${esc(o.content)}</div>`;
        }
      });
      h += `<div class="cell">
        <div class="cell-num">[${i+1}]</div>
        <div class="cell-body">
          <div class="code-block">
            <div class="code-header">
              <span class="code-lang">python</span>
              <button class="copy-btn" onclick="cpCell(${i},event)">copy</button>
            </div>
            <pre>${esc(cell.src)}</pre>
          </div>${outs}
        </div>
      </div>`;
    } else {
      h += `<div class="cell">
        <div class="cell-num">&#10022;</div>
        <div class="cell-body"><div class="cell-md">${esc(cell.src)}</div></div>
      </div>`;
    }
  });
  area.innerHTML = h;
  area.scrollTop = 0;
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cpCell(i,e){
  if(!cur) return;
  navigator.clipboard.writeText(cur.cells[i].src).then(()=>{
    const b=e.target; b.textContent='copied!'; b.style.color='#00e5ff';
    setTimeout(()=>{ b.textContent='copy'; b.style.color=''; },1500);
  });
}

function copyAll(){
  if(!cur) return;
  const code = cur.cells.filter(c=>c.type==='code').map(c=>c.src).join('\n\n# ---\n\n');
  navigator.clipboard.writeText(code).then(()=>{
    const b=document.getElementById('btn-copy');
    b.textContent='✓ Copied!';
    setTimeout(()=>{ b.textContent='📋 Copy All Code'; },2000);
  });
}

function dlNb(){
  if(!cur) return;
  const ipynb = {
    nbformat:4, nbformat_minor:5,
    metadata:{ kernelspec:{ display_name:'Python 3', language:'python', name:'python3' } },
    cells: cur.cells.map((c,i)=>({ cell_type:c.type, metadata:{}, source:c.src, outputs:[], execution_count:null, id:'cell-'+i }))
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(ipynb,null,2)],{type:'application/json'}));
  a.download = cur.fname; a.click();
}

function openLb(img){ document.getElementById('lb-img').src=img.src; document.getElementById('lb').classList.add('on'); }
function closeLb(){ document.getElementById('lb').classList.remove('on'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });

window.addEventListener('load', init);
</script>
</body>
</html>
